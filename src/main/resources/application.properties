server.port=8080
server.servlet.context-path=/api
spring.application.name=ERP System

spring.datasource.url=jdbc:postgresql://localhost:5432/erp_db
spring.datasource.username=erp_admin
spring.datasource.password=01065065061
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

jwt.secret=erp_system_super_secret_key_min_256_bits_very_secure_2024_production_grade_security_key_for_jwt_tokens_use_this_one
jwt.expiration=86400000

spring.messages.basename=messages/messages
spring.messages.encoding=UTF-8
spring.messages.fallback-to-system-locale=false

logging.level.root=INFO
logging.level.com.erp=DEBUG
logging.level.com.erp.security=DEBUG
logging.level.com.erp.service=DEBUG

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB 

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always 

# Actuator/Health Endpoints
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true